name: Deploy WordPress a Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Subir cambios por FTP

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Subir archivos modificados
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          CHANGED=$(git diff HEAD~1 HEAD --name-only --diff-filter=ACM | grep "^wp-content/")
          echo "Archivos a subir:"
          echo "$CHANGED"

          if [ -z "$CHANGED" ]; then
            echo "Sin cambios en wp-content/, nada que subir."
            exit 0
          fi

          for FILE in $CHANGED; do
            if [ -f "$FILE" ]; then
              REMOTE_PATH="${FILE}"
              echo "Subiendo: $FILE -> $REMOTE_PATH"
              lftp -d -c "
                set ftp:ssl-allow no;
                set ssl:verify-certificate no;
                set net:timeout 30;
                set net:max-retries 3;
                open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" $FTP_SERVER;
                put \"$FILE\" -o \"$REMOTE_PATH\";
                bye
              " 2>&1
              echo "Exit code lftp: $?"
            fi
          done
          echo "Deploy completado."
