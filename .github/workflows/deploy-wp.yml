name: Deploy WordPress a Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Subir cambios por FTP FTPS

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Subir archivos modificados via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./wp-content/
          server-dir: public_html/wp-content/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/*.md

      - name: Purgar caché del servidor
        run: |
          sleep 10
          curl -s "https://ladulceriaregalos.com/wp-json/ld/v1/purge-cache?key=ld_purge_k9x2m4r8"
