name: Deploy WordPress a Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Subir cambios por FTP

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Deploy tema
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            mirror -R --verbose \
              wp-content/themes/la-dulceria/ \
              /public_html/wp-content/themes/la-dulceria/;
            mirror -R --verbose \
              wp-content/plugins/dulceria-features/ \
              /public_html/wp-content/plugins/dulceria-features/;
            mirror -R --verbose \
              wp-content/plugins/dulceria-wompi/ \
              /public_html/wp-content/plugins/dulceria-wompi/;
            bye
          "
